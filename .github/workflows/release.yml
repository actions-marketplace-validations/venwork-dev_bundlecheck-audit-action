name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: semver
        uses: PaulHatch/semantic-version@f29500c9d60a99ed5168e39ee367e0976884c46e # 6.0.1
        with:
          tag_prefix: "v"
          major_pattern: "SKIP_MAJOR"  # disabled — no major bumps until prod
          bump_each_commit: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Rebuild dist
        run: bun run build

      - name: Commit rebuilt dist if needed
        id: dist_commit
        env:
          VERSION_TAG: ${{ steps.semver.outputs.version_tag }}
        run: |
          if git diff --quiet -- dist; then
            echo "created=false" >> "${GITHUB_OUTPUT}"
            echo "dist is already up to date."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add dist
            git commit -m "chore(release): build dist for ${VERSION_TAG} [skip ci]"
            echo "created=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Push dist commit
        if: steps.dist_commit.outputs.created == 'true'
        run: git push origin HEAD:main

      - name: Create and push version tags
        env:
          VERSION_TAG: ${{ steps.semver.outputs.version_tag }}
        run: |
          MAJOR_TAG="v$(echo "${VERSION_TAG#v}" | cut -d. -f1)"
          git tag "${VERSION_TAG}"
          git tag -f "${MAJOR_TAG}"
          git push origin "refs/tags/${VERSION_TAG}"
          git push origin "refs/tags/${MAJOR_TAG}" --force

      - name: Publish GitHub release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          tag_name: ${{ steps.semver.outputs.version_tag }}
          generate_release_notes: true
